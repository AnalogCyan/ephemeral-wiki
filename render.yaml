services:
  - type: web
    name: ephemeral-wiki
    runtime: python
    plan: free
    buildCommand: pip install .
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: MODEL
        value: openrouter/free
      - key: PYTHON_VERSION
        value: "3.12"
